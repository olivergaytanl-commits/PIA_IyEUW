<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="discusión.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway&display=swap" rel="stylesheet">

    <title>Discusiones</title>
</head>
<body>

<nav class="navbar">
    <a href="Inicio.html" class="nav-left">Inicio</a>

    <div class="Busqueda">
        <input type="text" class="form-control nav-center" placeholder="Ingrese lo que desea buscar aquí">
        <button class="btn btn-outline-success nav-center">Buscar</button>
    </div>
    
    <a href="#Lectura" class="sesion nav-right">📖</a>
    <a href="Perfil.html" class="sesion nav-right">Perfil</a>
</nav>

<hr>

<div class="layout">

    <aside class="sidebar">
    <h2>Servicios en línea:</h2>
    <ul>
    <li><a href="Publi.html">Crear publicación</a></li>

    <li class="dropdown">
        <a href="#" onclick="toggleApariencia(); return false;">Apariencia</a>
        <ul class="submenu" id="submenuApariencia">
            <li><a href="#" onclick="setTheme('light')">Claro</a></li>
            <li><a href="#" onclick="setTheme('dark')">Oscuro</a></li>
        </ul>
    </li>

    <li><a href="Discusión.html">Discusiones</a></li>
    <li><a href="Historial.html">Historial</a></li>

    <li><a href="articulo.html">Artículo</a></li>

    <hr>

    <li><a href="InicioS.html">Iniciar sesión</a></li>
    <li><a href="#">Cerrar sesión</a></li>
</ul>
</aside>

<main class="contenido">

<!-- Crear discusión -->
<div class="crear-post mb-4">
    <h4>Crear discusión</h4>

    <input type="text" id="titulo" class="form-control mb-2" placeholder="Título de la discusión">

    <textarea id="contenido" class="form-control mb-2" placeholder="Escribe tu comentario..."></textarea>

    <button class="btn btn-primary" onclick="crearPost()">Publicar</button>
</div>

<!-- Contenedor de publicaciones -->
<div id="contenedor-posts">

    <div class="post">
        <div class="post-header">
            <img src="perfil.jpg" class="foto-perfil">
            <span class="usuario">Usuario123</span>
        </div>

        <h4 class="post-titulo">Comentario</h4>
        <span class="categoria">Definición 1</span>

        <p class="post-texto">
            Este es un ejemplo del texto que se usa como comentario.
        </p>
    </div>

</div>

</main>
  
</div>

<script>

// CREAR POST
function crearPost() {
    const titulo = document.getElementById("titulo").value;
    const contenido = document.getElementById("contenido").value;

    if (titulo === "" || contenido === "") {
        alert("Completa todos los campos");
        return;
    }

    const contenedor = document.getElementById("contenedor-posts");

    const nuevoPost = document.createElement("div");
    nuevoPost.classList.add("post");

    nuevoPost.innerHTML = `
        <div class="post-header">
            <img src="perfil.jpg" class="foto-perfil">
            <span class="usuario">Tú</span>
        </div>

        <h4 class="post-titulo">${titulo}</h4>
        <span class="categoria">Nueva</span>

        <p class="post-texto">${contenido}</p>
    `;

    contenedor.prepend(nuevoPost);

    document.getElementById("titulo").value = "";
    document.getElementById("contenido").value = "";
}

// DROPDOWN
function toggleApariencia() {
    const submenu = document.getElementById("submenuApariencia");
    submenu.style.display = submenu.style.display === "block" ? "none" : "block";
}

// MODO OSCURO + GUARDADO
function setTheme(theme) {
    if (theme === 'dark') {
        document.body.classList.add("dark");
        localStorage.setItem("theme", "dark");
    } else {
        document.body.classList.remove("dark");
        localStorage.setItem("theme", "light");
    }
}

// CARGAR TEMA
window.onload = function() {
    const theme = localStorage.getItem("theme");
    if (theme === "dark") {
        document.body.classList.add("dark");
    }
};

// CERRAR SUBMENU
document.addEventListener("click", function(event) {
    const submenu = document.getElementById("submenuApariencia");
    const boton = document.querySelector(".dropdown > a");

    if (!boton.contains(event.target) && !submenu.contains(event.target)) {
        submenu.style.display = "none";
    }
});

</script>

</body>
</html>
