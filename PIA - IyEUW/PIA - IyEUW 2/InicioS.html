<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="registro.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Raleway&display=swap" rel="stylesheet">

<title>Registro</title>
</head>

<body>

    <nav class="navbar">
    <a href="Inicio.html" class="nav-left">Inicio</a>

    <div class="Busqueda">
        <input type="text" class="form-control nav-center" placeholder="Ingrese lo que desea buscar aquí">
        <button class="btn btn-outline-success nav-center">Buscar</button>
    </div>
    
    <a href="#Lectura" class="sesion nav-right">📖</a>
    <a href="Perfil.html" class="sesion nav-right">Perfil</a>
    </nav>
    <hr>

        <div class="registro-container">

            <section id="login" class="registro-box">

                <h2 class="titulo-registro">Inicio de Sesión</h2>


                <div class="mb-3">
                <label class="form-label label-registro">Correo electrónico</label>
                <input type="email" class="form-control" placeholder="Ingrese su correo">
                </div>

                <div class="mb-3">
                <label class="form-label label-registro">Contraseña</label>
                <input type="password" class="form-control" placeholder="Ingrese su contraseña">
                </div>

                <button class="btn btn-outline-success w-100" style="color:white">
                Iniciar Sesión
                </button>

                <p class="cambio">
                    ¿No tienes cuenta?
                    <a href="#registro">Crear cuenta</a>
                </p>

            </section>


            <section id="registro" class="registro-box">

                <h2 class="titulo-registro">Registro de Usuario</h2>

                <div class="mb-3">
                <label class="form-label label-registro">Nombre completo</label>
                <input type="text" class="form-control" placeholder="Ingrese su nombre completo">
                </div>

                <div class="mb-3">
                <label class="form-label label-registro">Username</label>
                <input type="text" class="form-control" placeholder="Ingrese el user que desea tener">
                </div>

                <div class="mb-3">
                <label class="form-label label-registro">Correo electrónico</label>
                <input type="email" class="form-control" placeholder="Ingrese su correo">
                </div>

                <div class="mb-3">
                <label class="form-label label-registro">Contraseña</label>
                <input type="password" class="form-control" placeholder="Ingrese su contraseña">
                </div>

                <button class="btn btn-outline-success w-100" style="color:white">
                Registrarse
                </button>

            </section>

        </div>

</body>
</html>
