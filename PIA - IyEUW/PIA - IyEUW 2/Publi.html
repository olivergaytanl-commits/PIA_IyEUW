<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="Publi.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway&display=swap" rel="stylesheet">

    <title>Publicar</title>
</head>
<body>

<nav class="navbar">
    <a href="Inicio.html" class="nav-left">Inicio</a>

    <div class="Busqueda">
        <input type="text" class="form-control nav-center" placeholder="Ingrese lo que desea buscar aquí">
        <button class="btn btn-outline-success nav-center">Buscar</button>
    </div>
    
    <a href="#Lectura" class="sesion nav-right">📖</a>
    <a href="Perfil.html" class="sesion nav-right">Perfil</a>
</nav>

<hr>

<div class="layout">

    <aside class="sidebar">
    <h2>Servicios en línea:</h2>
    <ul>
    <li><a href="Publi.html">Crear publicación</a></li>

    <li class="dropdown">
        <a href="#" onclick="toggleApariencia(); return false;">Apariencia</a>
        <ul class="submenu" id="submenuApariencia">
            <li><a href="#" onclick="setTheme('light')">Claro</a></li>
            <li><a href="#" onclick="setTheme('dark')">Oscuro</a></li>
        </ul>
    </li>

    <li><a href="Discusión.html">Discusiones</a></li>
    <li><a href="Historial.html">Historial</a></li>

    <li><a href="articulo.html">Artículo</a></li>

    <hr>

    <li><a href="InicioS.html">Iniciar sesión</a></li>
    <li><a href="#">Cerrar sesión</a></li>
</ul>
</aside>    

    <main class="contenido">

        <div class="crear-post">

            <h3>Crear publicación</h3>

            <form>

                <label>Título de la publicación</label>
                <input type="text" class="form-control" placeholder="Ingrese el título">

                <label>Datos de la publicación</label>
                <textarea class="form-control" rows="4" placeholder="Describe tu publicación"></textarea>

                <label>Multimedia (opcional)</label>
                <input type="file" class="form-control" accept="image/*,video/*">

                <button type="submit" class="btn btn-outline-success publicar">
                    Publicar
                </button>

            </form>

        </div>

    </main>

</div>

<script>

// DROPDOWN
function toggleApariencia() {
    const submenu = document.getElementById("submenuApariencia");
    submenu.style.display = submenu.style.display === "block" ? "none" : "block";
}

// MODO OSCURO + GUARDADO
function setTheme(theme) {
    if (theme === 'dark') {
        document.body.classList.add("dark");
        localStorage.setItem("theme", "dark");
    } else {
        document.body.classList.remove("dark");
        localStorage.setItem("theme", "light");
    }
}

// CARGAR TEMA
window.onload = function() {
    const theme = localStorage.getItem("theme");
    if (theme === "dark") {
        document.body.classList.add("dark");
    }
};

// CERRAR SUBMENU
document.addEventListener("click", function(event) {
    const submenu = document.getElementById("submenuApariencia");
    const boton = document.querySelector(".dropdown > a");

    if (!boton.contains(event.target) && !submenu.contains(event.target)) {
        submenu.style.display = "none";
    }
});

</script>

</body>
</html>
